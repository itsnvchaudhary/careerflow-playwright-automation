name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  test:
    name: Run Playwright E2E Suite
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CI: true
      ENVIRONMENT: ci
      HEADLESS: true
      CAREERFLOW_EMAIL: ${{ secrets.CAREERFLOW_EMAIL }}
      CAREERFLOW_PASSWORD: ${{ secrets.CAREERFLOW_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          check-latest: true
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-browsers-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Validate test discovery
        run: |
          echo "Working directory: $(pwd)"
          echo "Listing test files in repository"
          find . -maxdepth 3 -type f \( -name '*.spec.js' -o -name '*.spec.ts' -o -name '*.test.js' -o -name '*.test.ts' \) | sort
          echo "Listing Playwright configuration file"
          ls -la playwright.config.js
          echo "Listing Playwright tests from config"
          npx playwright test --list --config=playwright.config.js

      - name: Run Playwright tests
        run: npm run test:ci

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
            screenshots
          retention-days: 30
